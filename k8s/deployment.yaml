apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-tracker

  template:
    metadata:
      labels:
        app: expense-tracker

    spec:
      containers:
      - name: expense-tracker
        image: expense-tracker-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3000